name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      app_url:
        description: 'Flask app URL for the APK'
        required: true
        default: 'http://localhost:5000'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate keystore for signing
        run: |
          keytool -genkey -v -keystore ${{ github.workspace }}/dailynews.keystore \
            -alias dailynews -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass dailynews123 -keypass dailynews123 \
            -dname "CN=DailyNews, OU=Dev, O=DailyNews, L=Bolzano, ST=BZ, C=IT"

      - name: Install Capacitor dependencies
        working-directory: capacitor
        run: npm install

      - name: Set app URL
        working-directory: capacitor
        env:
          APP_URL: ${{ github.event.inputs.app_url || 'http://localhost:5000' }}
        run: node copy-www.js

      - name: Update Capacitor config with target URL
        working-directory: capacitor
        env:
          APP_URL: ${{ github.event.inputs.app_url || 'http://localhost:5000' }}
        run: |
          node -e "
            const fs = require('fs');
            const config = JSON.parse(fs.readFileSync('capacitor.config.json', 'utf8'));
            config.server = { url: process.env.APP_URL, cleartext: true };
            fs.writeFileSync('capacitor.config.json', JSON.stringify(config, null, 2));
          "

      - name: Sync Capacitor
        working-directory: capacitor
        run: npx cap sync android

      - name: Build signed release APK
        working-directory: capacitor/android
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/dailynews.keystore
          KEYSTORE_PASSWORD: dailynews123
          KEY_ALIAS: dailynews
          KEY_PASSWORD: dailynews123
        run: chmod +x gradlew && ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: daily-news-apk
          path: capacitor/android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
