name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      app_url:
        description: 'Flask app URL for the APK'
        required: true
        default: 'http://localhost:5000'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Capacitor dependencies
        working-directory: capacitor
        run: npm install

      - name: Set app URL
        working-directory: capacitor
        env:
          APP_URL: ${{ github.event.inputs.app_url || 'http://localhost:5000' }}
        run: node copy-www.js

      - name: Update Capacitor config with target URL
        working-directory: capacitor
        env:
          APP_URL: ${{ github.event.inputs.app_url || 'http://localhost:5000' }}
        run: |
          node -e "
            const fs = require('fs');
            const config = JSON.parse(fs.readFileSync('capacitor.config.json', 'utf8'));
            config.server = { url: process.env.APP_URL, cleartext: true };
            fs.writeFileSync('capacitor.config.json', JSON.stringify(config, null, 2));
          "

      - name: Sync Capacitor
        working-directory: capacitor
        run: npx cap sync android

      - name: Build APK
        working-directory: capacitor/android
        run: chmod +x gradlew && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: daily-news-apk
          path: capacitor/android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
